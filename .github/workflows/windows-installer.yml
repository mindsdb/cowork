name: Windows Installer

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*"

jobs:
  build-win-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Export python path for npm/node-gyp
        shell: pwsh
        run: |
          "npm_config_python=$((Get-Command python).Source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w node-pty

      - name: Build Windows installer (PR unsigned)
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build Windows installer (signed)
        if: ${{ github.event_name != 'pull_request' }}
        run: npm run dist:win
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.blockmap
