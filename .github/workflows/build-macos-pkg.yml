name: Build macOS pkg

on:
  workflow_call:
    inputs:
      build_kind:
        description: preview | stable | prod
        required: true
        type: string
    outputs:
      artifact_name:
        description: Final pkg file name (uploaded as the artifact name)
        value: ${{ jobs.build.outputs.artifact_name }}
    secrets:
      APPLE_DEV_ID_APP_CERT_B64:
        required: true
      APPLE_DEV_ID_APP_CERT_PASSWORD:
        required: true
      APPLE_DEV_ID_INSTALLER_CERT_B64:
        required: true
      APPLE_DEV_ID_INSTALLER_CERT_PASSWORD:
        required: true
      APPLE_ID:
        required: true
      APPLE_APP_SPECIFIC_PASSWORD:
        required: true
      APPLE_TEAM_ID:
        required: true
      APPLE_INSTALLER_IDENTITY:
        required: true
      GOOGLE_CLIENT_ID:
        required: true
      GOOGLE_CLIENT_SECRET:
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 120
    outputs:
      artifact_name: ${{ steps.name.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Upgrade npm for supply-chain protections
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Import Apple signing certificates
        env:
          APPLE_DEV_ID_APP_CERT_B64: ${{ secrets.APPLE_DEV_ID_APP_CERT_B64 }}
          APPLE_DEV_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEV_ID_APP_CERT_PASSWORD }}
          APPLE_DEV_ID_INSTALLER_CERT_B64: ${{ secrets.APPLE_DEV_ID_INSTALLER_CERT_B64 }}
          APPLE_DEV_ID_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_DEV_ID_INSTALLER_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          APP_CERT_PATH="$RUNNER_TEMP/dev_app_cert.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/dev_installer_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$APPLE_DEV_ID_APP_CERT_B64" | base64 --decode > "$APP_CERT_PATH"
          echo "$APPLE_DEV_ID_INSTALLER_CERT_B64" | base64 --decode > "$INSTALLER_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          security import "$APP_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_DEV_ID_APP_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security import "$INSTALLER_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_DEV_ID_INSTALLER_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Inject Google OAuth credentials
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python3 -c "
          import os, re
          path = 'server/routes/integrations.py'
          content = open(path).read()
          content = re.sub(r'os\.environ\.get\(\"GOOGLE_CLIENT_ID\",\s*\"\"\)', repr(os.environ['GOOGLE_CLIENT_ID']), content)
          content = re.sub(r'os\.environ\.get\(\"GOOGLE_CLIENT_SECRET\",\s*\"\"\)', repr(os.environ['GOOGLE_CLIENT_SECRET']), content)
          open(path, 'w').write(content)
          "

      - name: Build, sign and notarize pkg
        env:
          CSC_FOR_PULL_REQUEST: "true"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_APPLE_ID: ${{ secrets.APPLE_ID }}
          GH_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          GH_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: npm run release:mac:pkg:notarized

      - name: Compute artifact name
        id: name
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          SHA="${GITHUB_SHA::7}"
          case "${{ inputs.build_kind }}" in
            preview) NAME="anton-${VERSION}-preview-${SHA}.pkg" ;;
            stable)  NAME="anton-${VERSION}-stable-${SHA}.pkg"  ;;
            prod)    NAME="anton-${VERSION}.pkg" ;;
            *) echo "Unknown build_kind: ${{ inputs.build_kind }}"; exit 1 ;;
          esac
          echo "artifact_name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "Computed artifact name: ${NAME}"

      - name: Rename pkg
        run: |
          set -euo pipefail
          mkdir -p out
          NAME="${{ steps.name.outputs.artifact_name }}"
          mv release/*.pkg "out/${NAME}"

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.artifact_name }}
          path: out/
          if-no-files-found: error
