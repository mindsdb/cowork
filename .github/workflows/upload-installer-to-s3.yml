name: Upload installer to S3

on:
  workflow_call:
    inputs:
      platform:
        description: mac | windows
        required: true
        type: string
      build_kind:
        description: preview | stable | prod
        required: true
        type: string
      artifact_name:
        description: Artifact name produced by the build workflow (also the final file name)
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  upload:
    runs-on: mdb-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: out

      - name: Validate Windows signing report before upload
        if: inputs.platform == 'windows'
        run: |
          set -euo pipefail
          REPORT_JSON="out/signing-report/installer-signature-report.json"
          if [ ! -f "$REPORT_JSON" ]; then
            echo "::error::Missing signing report: $REPORT_JSON"
            ls -la out || true
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const p = process.argv[1];
            const r = JSON.parse(fs.readFileSync(p, "utf8"));
            const required = ["status", "signerSubject", "timestampSubject", "sha256"];
            for (const k of required) {
              if (!r[k]) {
                console.error(`::error::signing-report missing field: ${k}`);
                process.exit(1);
              }
            }
            if (r.status !== "Valid") {
              console.error(`::error::Invalid signature status: ${r.status} (${r.statusMessage || ""})`);
              process.exit(1);
            }
            console.log(`Windows signing report OK: ${r.file} sha256=${r.sha256}`);
          ' "$REPORT_JSON"

      - name: Upload to S3
        env:
          PLATFORM: ${{ inputs.platform }}
          KIND: ${{ inputs.build_kind }}
          NAME: ${{ inputs.artifact_name }}
        run: |
          set -euo pipefail
          BUCKET="anton-installer"
          PREFIX="anton/${PLATFORM}"
          BASE="s3://${BUCKET}/${PREFIX}"
          EXT="${NAME##*.}"
          SRC="out/${NAME}"

          if [ ! -f "$SRC" ]; then
            echo "::error::Expected file $SRC not found in downloaded artifact"
            ls -la out || true
            exit 1
          fi
          LOCAL_SHA=$(sha256sum "$SRC" | awk '{print $1}')

          REGION=$(aws s3api get-bucket-location --bucket "$BUCKET" --query LocationConstraint --output text 2>/dev/null || echo "")
          if [ -z "$REGION" ] || [ "$REGION" = "None" ] || [ "$REGION" = "null" ]; then
            REGION="us-east-1"
          fi
          HTTPS_BASE="https://${BUCKET}.s3.${REGION}.amazonaws.com"
          CDN_BASE="https://downloads.mindsdb.com"

          UPLOADED_KEYS=()

          upload() {
            local src="$1" key="$2"
            aws s3 cp "$src" "s3://${BUCKET}/${key}"
            UPLOADED_KEYS+=("$key")
          }

          case "$KIND" in
            preview)
              upload "$SRC" "${PREFIX}/previews/${NAME}"
              ;;
            stable)
              upload "$SRC" "${PREFIX}/snapshots/${NAME}"
              ;;
            prod)
              VERSION=$(node -p "require('./package.json').version")
              upload "$SRC" "${PREFIX}/anton-${VERSION}.${EXT}"
              upload "$SRC" "${PREFIX}/anton-latest.${EXT}"
              ;;
            *)
              echo "::error::Unknown build_kind: $KIND"
              exit 1
              ;;
          esac

          echo ""
          echo "Uploaded ${#UPLOADED_KEYS[@]} object(s) to s3://${BUCKET} (region: ${REGION})"
          echo ""
          {
            echo "### Installer uploaded to S3"
            echo ""
            echo "- **Platform**: \`${PLATFORM}\`"
            echo "- **Build kind**: \`${KIND}\`"
            echo "- **Bucket**: \`${BUCKET}\` (\`${REGION}\`)"
            echo ""
            echo "| S3 URI | Object URL | Public download URL |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          for KEY in "${UPLOADED_KEYS[@]}"; do
            S3_URI="s3://${BUCKET}/${KEY}"
            OBJECT_URL="${HTTPS_BASE}/${KEY}"
            # CloudFront (downloads.mindsdb.com) fronts the bucket root with no
            # path rewriting, so the public URL preserves the full object key.
            CDN_URL="${CDN_BASE}/${KEY}"
            echo "  ${S3_URI}"
            echo "  ${OBJECT_URL}"
            echo "  ${CDN_URL}"
            echo "| \`${S3_URI}\` | ${OBJECT_URL} | ${CDN_URL} |" >> "$GITHUB_STEP_SUMMARY"

            TMP_FILE="$(mktemp)"
            aws s3 cp "${S3_URI}" "$TMP_FILE" >/dev/null
            REMOTE_SHA=$(sha256sum "$TMP_FILE" | awk '{print $1}')
            rm -f "$TMP_FILE"
            if [ "$REMOTE_SHA" != "$LOCAL_SHA" ]; then
              echo "::error::SHA256 mismatch for ${S3_URI}. local=${LOCAL_SHA} remote=${REMOTE_SHA}"
              exit 1
            fi
            echo "| \`${S3_URI}\` | ✅ sha256 verified (\`${REMOTE_SHA}\`) | ${CDN_URL} |" >> "$GITHUB_STEP_SUMMARY"
          done

          {
            echo ""
            echo "### Public download URLs"
            echo ""
            echo "These installers are served via CloudFront at https://downloads.mindsdb.com (see \`terraform/newprod/us-east-1/anton/cloudfront.tf\`):"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          for KEY in "${UPLOADED_KEYS[@]}"; do
            echo "- ${CDN_BASE}/${KEY}" >> "$GITHUB_STEP_SUMMARY"
          done
