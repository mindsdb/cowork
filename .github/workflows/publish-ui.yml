name: Publish UI Bundle

on:
  push:
    tags:
      - 'ui-v*'    # e.g. ui-v1.2.0
  workflow_dispatch:
    inputs:
      version:
        description: 'UI version (e.g. 1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=ui-v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#ui-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package renderer bundle
        run: |
          cd dist/renderer
          tar czf ../../ui-bundle.tar.gz .
          cd ../..
          sha256sum ui-bundle.tar.gz | awk '{print $1}' > ui-bundle.sha256

      - name: Publish to antontron-releases
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          SHA256=$(cat ui-bundle.sha256)
          DOWNLOAD_URL="https://github.com/mindsdb/antontron-releases/releases/download/${TAG}/ui-bundle.tar.gz"

          # Clone the public releases repo
          git clone "https://x-access-token:${RELEASES_TOKEN}@github.com/mindsdb/antontron-releases.git" releases-repo

          # Create release with the bundle via gh CLI
          cd releases-repo
          gh release create "$TAG" \
            --title "UI $VERSION" \
            --notes "Renderer UI bundle v${VERSION}" \
            ../ui-bundle.tar.gz \
            || { echo "Release may already exist, uploading asset..."; gh release upload "$TAG" ../ui-bundle.tar.gz --clobber; }

          # Update latest.json on gh-pages
          git fetch origin gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Write manifest
          cat > latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "url": "${DOWNLOAD_URL}",
            "sha256": "${SHA256}"
          }
          MANIFEST

          python3 -c "
          import json
          with open('latest.json') as f:
              data = json.load(f)
          with open('latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "UI ${VERSION}" || echo "No changes"
          git push origin gh-pages
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
