name: Publish UI Bundle

on:
  push:
    branches:
      - main
    paths:
      - 'src/renderer/**'
      - 'src/shared/**'
      - 'package.json'
    tags:
      - 'ui-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'UI version (e.g. 1.2.0) — leave empty to use package.json'
        required: false

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Manual dispatch with explicit version
            VER="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/ui-v* ]]; then
            # Tag push
            VER="${GITHUB_REF#refs/tags/ui-v}"
          else
            # Push to main — use package.json version + short sha for uniqueness
            BASE_VER=$(node -p "require('./package.json').version")
            SHORT_SHA=$(git rev-parse --short HEAD)
            VER="${BASE_VER}-${SHORT_SHA}"
          fi

          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=ui-v$VER" >> "$GITHUB_OUTPUT"
          echo "Publishing UI version: $VER"

      - name: Check if version already published
        id: check
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" --repo mindsdb/antontron-releases &>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $TAG already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package renderer bundle
        if: steps.check.outputs.skip != 'true'
        run: |
          cd dist/renderer
          tar czf ../../ui-bundle.tar.gz .
          cd ../..
          sha256sum ui-bundle.tar.gz | awk '{print $1}' > ui-bundle.sha256

      - name: Publish to antontron-releases
        if: steps.check.outputs.skip != 'true'
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          # -e: halt on first failure (so a bad token fails here, not
          # three commands later). pipefail: propagate failure of the
          # `echo | gh auth login` pipe. (-u omitted on purpose — the
          # gh-pages git steps below use `|| fallback` idioms that are
          # fine with unset edge cases.)
          set -eo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          SHA256=$(cat ui-bundle.sha256)
          DOWNLOAD_URL="https://github.com/mindsdb/antontron-releases/releases/download/${TAG}/ui-bundle.tar.gz"

          # Fail loudly if the token secret is missing/empty. Without
          # this the public-repo clone below still succeeds (no auth
          # needed to read a public repo), and the failure only shows
          # up later as a confusing 401 from `gh`.
          if [ -z "${RELEASES_TOKEN}" ]; then
            echo "::error::RELEASES_TOKEN secret is empty. Set a PAT (or app token) with contents:write on mindsdb/antontron-releases."
            exit 1
          fi

          # Authenticate gh explicitly with the token. `gh` prefers the
          # GH_TOKEN env var over a logged-in credential, so we must NOT
          # have GH_TOKEN set here (note it's been removed from this
          # step's env above) — otherwise `gh auth login` is a no-op and
          # gh keeps using the env value. `gh auth status` then surfaces
          # an invalid/expired token immediately rather than as a vague
          # 401 three commands later.
          unset GH_TOKEN || true
          echo "${RELEASES_TOKEN}" | gh auth login --with-token
          gh auth status

          # Clone the public releases repo
          git clone "https://x-access-token:${RELEASES_TOKEN}@github.com/mindsdb/antontron-releases.git" releases-repo

          # Create release with the bundle via gh CLI
          cd releases-repo
          gh release create "$TAG" \
            --title "UI $VERSION" \
            --notes "Renderer UI bundle v${VERSION}" \
            ../ui-bundle.tar.gz \
            || { echo "Release may already exist, uploading asset..."; gh release upload "$TAG" ../ui-bundle.tar.gz --clobber; }

          # Update latest.json on gh-pages
          git fetch origin gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Write manifest
          cat > latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "url": "${DOWNLOAD_URL}",
            "sha256": "${SHA256}"
          }
          MANIFEST

          python3 -c "
          import json
          with open('latest.json') as f:
              data = json.load(f)
          with open('latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "UI ${VERSION}" || echo "No changes"
          git push origin gh-pages
