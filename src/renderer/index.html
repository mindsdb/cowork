<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' ws://localhost:* http://127.0.0.1:* http://localhost:*; frame-src http://127.0.0.1:* http://localhost:*; child-src http://127.0.0.1:* http://localhost:*" />
    <title>Anton</title>
    <link rel="stylesheet" href="./gravity-field/gravity-field.css" />
  </head>
  <!-- Theme is set by React (data-theme=light|dark on body) once it
       reads the persisted preference. Default to dark on first paint so
       the canvas + page colour don't flash white. -->
  <body class="gf-theme-dark">
    <!-- Animated background canvas — fixed full-window, zero z-index,
         pointer-events:none. The React root sits above with z-index:1. -->
    <canvas id="gravity-field-bg" class="gravity-field" aria-hidden="true"></canvas>
    <div id="root"></div>
    <script src="./gravity-field/gravity-field.js"></script>
    <script>
      // Mount once; React calls window.gravityField.setTheme(...) when
      // the theme preference changes. pointerTarget=document.body so the
      // canvas (which has pointer-events:none) still sees cursor coords.
      // trackPointer:false → field drifts freely on its own; cursor
      // doesn't steer the attractor. The default would steer toward the
      // mouse, which felt distracting once the dots cover the whole window.
      window.gravityField = window.GravityField.mount(
        document.getElementById('gravity-field-bg'),
        { theme: 'dark', trackPointer: false },
      );
    </script>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
